<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHITBALLIN67</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f0f0f, #1a0033);
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }
        .main {
            font-size: 9rem;
            font-weight: bold;
            letter-spacing: 0.1em;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
            line-height: 1;
        }
        .subtitle {
            font-size: 2.5rem;
            margin-top: 20px;
            opacity: 0.9;
        }
        .tag {
            margin-top: 60px;
            font-size: 1.4rem;
            color: #ff00aa;
        }
        .clock {
            margin-top: 30px;
            font-size: 1.8rem;
            color: #00ff88;
            text-shadow: 0 0 15px #00ff88;
            letter-spacing: 0.05em;
        }
        .clock-date {
            font-size: 1rem;
            color: #ff00aa;
            margin-top: 6px;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div>
        <div class="main">6 7</div>
        <div class="subtitle">SHITBALLIN</div>
        <div class="tag">EST. 2026 🔥</div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="clock-date" id="clock-date">---</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            const date = now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            document.getElementById('clock').textContent = time;
            document.getElementById('clock-date').textContent = date;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
